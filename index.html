<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据安全未来旅程 · 协作平台</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Inline critical styles for instant render */
    body { background: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; color: #1e293b; }
  </style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<header class="portal-header">
  <h1>
    <span class="icon">🗺️</span>
    数据安全未来旅程
  </h1>
  <div class="header-right">
    <div class="sync-status">
      <span class="dot"></span>
      <span class="status-text">离线模式</span>
    </div>
    <button class="btn btn-outline btn-sm" onclick="syncAllToCloud()" title="手动同步所有旅程到云端">☁️ 同步</button>
  </div>
</header>

<!-- ═══════════ MAIN ═══════════ -->
<main class="portal-main">
  <div class="section-title">📋 用户旅程地图</div>
  <div class="cards-grid" id="cards-grid"></div>
</main>

<div id="portal-toast"></div>

<input type="file" id="html-file-input" accept=".html,.htm" style="display:none">

<script>
  // API 配置 — 本地开发用 localhost:3000，生产环境用 Railway 后端
  window.API_BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3000/api'
    : 'https://datasecurity-api.onrender.com/api';
</script>
<script src="js/api-client.js"></script>
<script src="js/portal.js"></script>

<script>
  // Manual cloud sync
  function syncAllToCloud() {
    if (!window._apiClient || !window._apiClient.isConnected()) {
      alert('云端未连接。请确保后端 API 服务已启动。\n\n当前为离线模式，数据保存在浏览器本地。');
      return;
    }
    // 触发所有旅程保存（通过 localStorage → 下次打开旅程编辑时会自动同步）
    alert('请打开各旅程页面进行编辑保存，系统会自动同步到云端。');
  }
</script>

</body>
</html>
